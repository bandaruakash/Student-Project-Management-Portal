
<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#ff6b6b,#ff8e53,#ffcc70,#7f5af0);
background-size:400% 400%;
animation:gradientBG 10s ease infinite;
color:white;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.2);
}

.header h2{
font-size:32px;
font-weight:700;
color:white;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

/* SEARCH */

.search-bar{
display:flex;
justify-content:center;
margin-bottom:25px;
}

#search{
width:600px;
max-width:100%;
padding:15px 20px;
border:none;
outline:none;
border-radius:40px;
background:rgba(255,255,255,0.2);
color:white;
backdrop-filter:blur(10px);
}

#search::placeholder{
color:white;
}

/* INPUTS */

input,
textarea{
width:100%;
padding:15px;
margin:10px 0;
border:none;
outline:none;
border-radius:15px;
background:rgba(255,255,255,0.2);
color:white;
backdrop-filter:blur(10px);
}

input::placeholder,
textarea::placeholder{
color:white;
}

textarea{
min-height:120px;
resize:none;
}

/* BUTTONS */

button{
border:none;
padding:12px 24px;
border-radius:12px;
cursor:pointer;
color:white;
font-weight:600;
background:linear-gradient(135deg,#ff512f,#dd2476);
transition:0.3s;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.logout-btn{
background:linear-gradient(135deg,#667eea,#764ba2);
}

/* TASK GRID */

#tasks{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
margin-top:30px;
}

/* TASK CARD */

.task{
background:rgba(255,255,255,0.18);
backdrop-filter:blur(15px);
border-radius:20px;
padding:20px;
transition:0.3s;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

.task:hover{
transform:translateY(-8px);
}

.task h3{
margin-bottom:10px;
color:#fff;
}

/* STATUS */

.completed{
background:#00c853;
padding:6px 12px;
border-radius:20px;
font-size:12px;
}

.pending{
background:#ff1744;
padding:6px 12px;
border-radius:20px;
font-size:12px;
}

/* ACTIONS */

.actions{
display:flex;
gap:10px;
margin-top:15px;
}

/* EMPTY */

.empty{
text-align:center;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.15);
}

/* MOBILE */

@media(max-width:768px){


.header{
    flex-direction:column;
    gap:15px;
}

#tasks{
    grid-template-columns:1fr;
}


}



</style>
</head>

<body>

  <div style="
position:fixed;
width:300px;
height:300px;
background:#ff00ff;
filter:blur(150px);
top:-100px;
left:-100px;
z-index:-1;">
</div>

<div style="
position:fixed;
width:300px;
height:300px;
background:#00ffff;
filter:blur(150px);
bottom:-100px;
right:-100px;
z-index:-1;">
</div>

<!-- HEADER -->
<div class="header">
  <h2>ADD YOUR WORKS</h2>

  <div>
    <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">

  <!-- SEARCH BAR TOP CENTER -->
  <div class="search-bar">
    <input
      id="search"
      placeholder="🔍 Search Tasks"
      onkeyup="loadTasks()"
    >
  </div>

  <!-- TITLE -->
  <input
    id="title"
    placeholder="Task Title"
  >

  <br>

  <!-- DESCRIPTION -->
  <textarea
    id="description"
    rows="4"
    placeholder="Task Description (minimum 20 characters)"
  ></textarea>

  <br>

  <!-- DEADLINE -->
  <input
    id="deadline"
    type="datetime-local"
  >

  <br>

  <button onclick="addTask()">
    Add Task
  </button>

  <h3 id="count"></h3>

  <div id="loading" style="display:none">
    Loading Tasks...
  </div>

  <div id="tasks"></div>

</div>

<script>

const token = localStorage.getItem("token");

// LOGOUT
function logout() {
  localStorage.clear();
  window.location = "login.html";
}

// DARK MODE
function toggleDarkMode() {
  document.body.classList.toggle("dark");
}

// LOAD TASKS
async function loadTasks() {

  loading.style.display = "block";

  const res = await fetch(
    "http://localhost:5000/tasks",
    {
      headers: {
        Authorization: token
      }
    }
  );

  let data = await res.json();

  loading.style.display = "none";

  // SEARCH
  const keyword = search.value.toLowerCase().trim();

data = data.filter(task => {

  const title =
    task.title.toLowerCase();

  const description =
    task.description.toLowerCase();

  const progress =
    task.completed
      ? "completed"
      : "pending";

  const createdDate =
    new Date(task.createdAt)
      .toLocaleString()
      .toLowerCase();

  return (
    title.includes(keyword) ||
    description.includes(keyword) ||
    progress.includes(keyword) ||
    createdDate.includes(keyword)
  );

});

  tasks.innerHTML = "";

  count.innerText =
    "Total Tasks: " + data.length;

  // EMPTY STATE
  if(data.length === 0){

    tasks.innerHTML = `
      <div class="empty">
        <h3>No Tasks Found 📭</h3>
      </div>
    `;

    return;
  }

  data.forEach(t => {

    const div =
      document.createElement("div");

    div.className = "task";

    const status = t.completed
      ? "<span class='completed'>COMPLETED</span>"
      : "<span class='pending'>PENDING</span>";

    div.innerHTML = `
      <h3>${t.title}</h3>

      <p>
        <b>Description:</b><br>
        ${t.description}
      </p>

      <p>
        <b>Status:</b>
        ${status}
      </p>

      <p>
        <b>Created Date:</b><br>
        ${new Date(t.createdAt)
          .toLocaleString()}
      </p>

      <p>
        <b>Deadline:</b><br>
        ${new Date(t.deadline)
          .toLocaleString()}
      </p>

      <div class="actions">

        <button
          onclick="completeTask('${t._id}')">
          ✔ Complete
        </button>

        <button
          onclick="deleteTask('${t._id}')">
          ❌ Delete
        </button>

      </div>
    `;

    tasks.appendChild(div);

  });

}

// ADD TASK
async function addTask() {

  if(
    !title.value ||
    !description.value ||
    !deadline.value
  ){
    alert("Fill all fields");
    return;
  }

  if(description.value.length < 20){
    alert(
      "Description must be at least 20 characters"
    );
    return;
  }

  await fetch(
    "http://localhost:5000/addTask",
    {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        Authorization:token
      },
      body:JSON.stringify({
        title:title.value,
        description:description.value,
        deadline:deadline.value
      })
    }
  );

  title.value = "";
  description.value = "";
  deadline.value = "";

  loadTasks();
}

// COMPLETE TASK
async function completeTask(id){

  await fetch(
    `http://localhost:5000/complete/${id}`,
    {
      method:"PUT",
      headers:{
        Authorization:token
      }
    }
  );

  loadTasks();
}

// DELETE TASK
async function deleteTask(id){

  await fetch(
    `http://localhost:5000/delete/${id}`,
    {
      method:"DELETE",
      headers:{
        Authorization:token
      }
    }
  );

  loadTasks();
}

// INITIAL LOAD
loadTasks();

</script>

</body>
</html>
